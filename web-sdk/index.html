<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yalo Chat SDK Demo</title>
    <link rel="stylesheet" href="/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add,arrow_forward,check,close,description,error,mic,pause,play_arrow,send,stop"
      rel="stylesheet"
    />
  </head>
  <body>
    <img class="logo" src="yalo-logo.svg" alt="Yalo" />
    <div class="chat-widget">
      <div id="yalo-chat"></div>
      <button type="button" class="fab" id="chat-fab" aria-label="Open chat">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <title>Chat button</title>
          <path
            d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
          ></path>
        </svg>
      </button>
    </div>

    <script type="module">
      import { YaloChatClient } from '/src/chat.ts';

      const client = new YaloChatClient({
        channelId: '41894cd0-846c-4ea6-9e33-0a5d0d68b36b', // Your channel id
        organizationId: '1000000169', // Your organization id
        channelName: 'Chat Demo', // Your channel name that will appear in the bot chat
        image: '/oris-icon.svg',
        target: 'yalo-chat',
        persistent: false,
        userId: 'rodrigo-custodio-test-1', // Optional: identify the user with your own ID
        userId: 'test', // Optional: identify the user with your own ID
      });
      const fab = document.getElementById('chat-fab');
      client.init({
        onOpen: () => fab.classList.add('open'),
        onClose: () => fab.classList.remove('open'),
      });

      fab.addEventListener('click', () => {
        if (client.chatWindowEl?.open) {
          client.close();
        } else {
          client.open();
        }
      });
    </script>
  </body>
</html>
