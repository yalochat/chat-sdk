name: Release Android SDK

on:
  push:
    tags:
      - 'android-sdk/v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-sdk

    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks Scan
        run: docker run --rm -v ${{ github.workspace }}:/code zricethezav/gitleaks:latest detect --source="/code" -v

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#android-sdk/v}" >> $GITHUB_OUTPUT

      - name: Run unit tests
        run: ./gradlew :sdk:testDebugUnitTest

      - name: Publish to Maven Central
        # publishMavenPublication targets only the Android AAR — skips iOS klib
        # publications that the KMP plugin registers but can't build on Linux.
        run: ./gradlew :sdk:publishMavenPublicationToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ steps.version.outputs.VERSION }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Android SDK v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
