name: Release iOS SDK

on:
  push:
    tags:
      - 'ios-sdk/v*.*.*'

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#ios-sdk/v}" >> $GITHUB_OUTPUT

      - name: Build XCFramework
        run: cd android-sdk && ./gradlew :sdk:assembleChatSdkReleaseXCFramework

      - name: Zip XCFramework
        id: zip
        run: |
          XCFW_DIR="android-sdk/sdk/build/XCFrameworks/release"
          cd "$XCFW_DIR"
          zip -r ChatSdk.xcframework.zip ChatSdk.xcframework
          CHECKSUM=$(swift package compute-checksum ChatSdk.xcframework.zip)
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT
          cp ChatSdk.xcframework.zip "$GITHUB_WORKSPACE/ChatSdk.xcframework.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "iOS SDK v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: ChatSdk.xcframework.zip
