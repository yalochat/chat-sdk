name: Android SDK Pipeline

on:
  push:
    branches:
      - 'main'
    paths:
      - 'android-sdk/**'
      - 'ios-sdk/**'
      - '.github/workflows/android-sdk-ci.yml'

  pull_request:
    paths:
      - 'android-sdk/**'
      - 'ios-sdk/**'
      - '.github/workflows/android-sdk-ci.yml'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-sdk

    steps:
      - uses: actions/checkout@v5

      - name: Gitleaks Scan
        run: docker run --rm -v ${{ github.workspace }}:/code zricethezav/gitleaks:v8.30.0 detect --source="/code" -v

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-sdk/gradle/libs.versions.toml', 'android-sdk/gradle/wrapper/gradle-wrapper.properties', 'android-sdk/sdk/build.gradle.kts', 'android-sdk/app/build.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Lint
        run: ./gradlew :sdk:lint

      - name: Unit tests
        run: ./gradlew :sdk:testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: android-sdk/sdk/build/reports/tests/testDebugUnitTest/
          retention-days: 7

      - name: Build demo app (debug)
        run: ./gradlew :app:assembleDebug

      - name: Build release AAR + R8 gate
        # Builds both the SDK AAR and the demo app release APK so R8 shrinking runs
        # against the SDK's consumer-proguard-rules.pro. Any shrinking error surfaces here.
        run: ./gradlew :sdk:assembleRelease :app:assembleRelease

  xcframework:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./android-sdk

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-sdk/gradle/libs.versions.toml', 'android-sdk/gradle/wrapper/gradle-wrapper.properties', 'android-sdk/sdk/build.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('android-sdk/gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Build XCFramework
        run: ./gradlew :sdk:assembleChatSdkXCFramework

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatSdk-XCFramework
          path: android-sdk/sdk/build/XCFrameworks/release/ChatSdk.xcframework
          retention-days: 7

      - name: Create Credentials stub for CI
        working-directory: ./ios-sdk/YaloChatDemo
        run: cp Credentials.swift.example Credentials.swift

      - name: Build iOS demo app
        # Validates that the Swift layer consuming the XCFramework compiles cleanly.
        # Builds for the simulator (no code signing required).
        working-directory: ./ios-sdk
        run: |
          set -o pipefail
          xcodebuild build \
            -project YaloChatDemo.xcodeproj \
            -scheme YaloChatDemo \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty
